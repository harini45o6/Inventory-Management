<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopStock – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12; --surface: #141720; --border: #1f2430;
      --accent: #e8c547; --text: #d8dde8; --muted: #5a6070;
      --red: #ff5e5e; --green: #5ef08a;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }
    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      /* subtle grid pattern */
      background-image:
        linear-gradient(rgba(232,197,71,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,197,71,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      width: 380px;
      padding: 44px 40px;
      animation: rise .4s ease;
    }
    @keyframes rise { from { opacity:0; transform: translateY(20px); } to { opacity:1; } }
    .brand {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 5px;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .form-label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0f12;
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .error-msg {
      background: rgba(255,94,94,.1);
      border-left: 3px solid var(--red);
      color: var(--red);
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 20px;
      letter-spacing: .5px;
    }
    .hint {
      margin-top: 24px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">SHOPSTOCK</div>
    <div class="brand-sub">Inventory Management System</div>

    {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label class="form-label" for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus/>

      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password"/>

      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="hint">SHOPSTOCK v4.0 &nbsp;·&nbsp; Secure Access</div>
  </div>
</body>
</html>
